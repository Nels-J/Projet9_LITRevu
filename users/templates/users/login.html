{% extends 'users/base.html' %}

{% block title %}
    Connexion
{% endblock %}

{% block content %}
    <section class="auth-container">
        <h1>Se connecter</h1>

        {% if form.errors %}
            <p class="error">Identifiants invalides. Veuillez réessayer.</p>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}

            <div class="auth-actions">
                <button type="submit">Connexion</button>
                <a href="{% url 'users:register' %}" class="btn-register">S'enregistrer</a>
            </div>
        </form>
    </section>
{% endblock %}
